name: Static Preview Check

on:
  pull_request:
    paths:
      - "package.json"
      - "public/**"
      - "scripts/**"
      - "tools/gmail/**"
      - "tools/gcal/**"
      - ".github/workflows/static-preview-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-preview-check:
    name: Static preview validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tools/gmail/package-lock.json
            tools/gcal/package-lock.json

      - name: Install root dev dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Install Gmail adapter dependencies
        working-directory: tools/gmail
        run: npm ci

      - name: Install Calendar adapter dependencies
        working-directory: tools/gcal
        run: npm ci

      - name: Run static preview checks
        run: npm run check
        env:
          CI: true

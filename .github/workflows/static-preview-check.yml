name: Static Preview Check

on:
  pull_request:
    paths:
      - "package.json"
      - "public/**"
      - "tools/gmail/**"
      - ".github/workflows/static-preview-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-preview-check:
    name: Static preview validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run static preview checks
        run: npm run check

      - name: Run Gmail adapter checks
        run: npm --prefix tools/gmail run check
